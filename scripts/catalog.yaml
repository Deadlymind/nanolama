# nanolama skills catalog — the single source of truth.
# scripts/generate_readme.py renders the README table from this file, and
# scripts/validate_skills.py checks it is in 1:1 sync with skills/<name>/SKILL.md.
# To add a skill: create skills/<name>/SKILL.md, then add an entry here.

categories:
  - id: backend
    title: "Backend — Django & DRF"
    emoji: "🗄️"
  - id: frontend
    title: "Frontend — Next.js & React"
    emoji: "🎨"
  - id: fullstack
    title: "Full-stack contract"
    emoji: "🔗"
  - id: infra
    title: "Infra & DevOps — AWS + CI"
    emoji: "☁️"
  - id: ai
    title: "AI integration"
    emoji: "🤖"
  - id: quality
    title: "Quality & Security"
    emoji: "🛡️"
  - id: workflow
    title: "Workflow & Meta"
    emoji: "🧰"

skills:
  # --- Backend / Django ---
  - name: codebase-guide
    category: backend
    blurb: "How a feature is built end to end: model to serializer to viewset to urls to tests."
  - name: multi-tenancy
    category: backend
    blurb: "entreprise FK on every business row; fail-closed auto-filtered ViewSets."
  - name: rbac-permissions
    category: backend
    blurb: "{resource}_{action} roles; secure-by-default checks; guard custom @actions."
  - name: drf-api
    category: backend
    blurb: "Serializers, viewsets, routers, pagination, export actions, the OpenAPI schema."
  - name: migrations
    category: backend
    blurb: "Safe schema + data migrations: apps.get_model, idempotent RunPython, tenant backfills."
  - name: celery-tasks
    category: backend
    blurb: "Hardened background jobs: time limits, retries/backoff, pass ids not objects, idempotency."
  - name: websockets-channels
    category: backend
    blurb: "Channels consumers, cookie-JWT WS auth, tenant-scoped groups, send-after-commit."
  - name: db-concurrency
    category: backend
    blurb: "Money/counter safety: select_for_update + atomic + F(); Decimal not float."
  - name: money-decimal
    category: backend
    blurb: "Fixed-precision Decimal money math: never float, quantize per step, one rate set, golden tests."
  - name: webhook-handler
    category: backend
    blurb: "Receive inbound webhooks safely: verify signature, dedupe by event id, resolve tenant, ack then enqueue."

  # --- Frontend / Next.js ---
  - name: nextjs-module
    category: frontend
    blurb: "Feature pattern: lib/api to query-keys to hooks to pages; the shared fetch client."
  - name: react-query
    category: frontend
    blurb: "Server state: query keys, staleTime, invalidation after mutations."
  - name: zustand-state
    category: frontend
    blurb: "Client stores with persist/partialize (ids not objects) and the hydration guard."
  - name: zod-forms
    category: frontend
    blurb: "Typed schemas + forms; the Select-all and z.coerce.number traps; i18n messages."
  - name: tailwind-shadcn
    category: frontend
    blurb: "Tailwind v4 semantic tokens + shared shadcn components; reuse, do not rebuild."
  - name: i18n-rtl
    category: frontend
    blurb: "next-intl fr/en/ar; every string via t(); logical CSS + Arabic RTL."

  # --- Full-stack seam ---
  - name: drf-zod-contract
    category: fullstack
    blurb: "Keep a DRF serializer and its Zod 4 schema / TanStack hook in sync, end to end."

  # --- Infra / DevOps / AWS ---
  - name: deploy-aws
    category: infra
    blurb: "Elastic Beanstalk + Amplify runbook: Procfile, migrate leader-only, env vars, rollback."
  - name: aws-services
    category: infra
    blurb: "Provision RDS Postgres, ElastiCache Redis, private S3 with an IAM instance role."
  - name: ci-cd
    category: infra
    blurb: "GitHub Actions gates: check, makemigrations --check, tests, lint, typecheck, build."

  # --- AI ---
  - name: ai-integration
    category: ai
    blurb: "Claude tool-use + agentic loops; the write-tool safety contract; OCR extraction; evals."

  # --- Quality & Security ---
  - name: code-review
    category: quality
    blurb: "Review the diff for correctness + reuse/simplify/efficiency; tenant/RBAC gates; ranked."
  - name: security-review
    category: quality
    blurb: "Audit for tenant isolation, RBAC gaps, PII leaks, upload validation, secrets."
  - name: write-tests
    category: quality
    blurb: "Django TestCase with tenant fixtures + the isolation test, and vitest fetch-mocking."
  - name: debug
    category: quality
    blurb: "Reproduce, isolate, hypothesize, fix root cause, verify + add a regression test."
  - name: verify
    category: quality
    blurb: "Drive the change end to end and observe real behavior before claiming done."
  - name: perf-review
    category: quality
    blurb: "Find N+1 / unbounded queries; select_related, prefetch_related, bounded dashboards."
  - name: dependency-audit
    category: quality
    blurb: "Audit Python + JS deps for CVEs and drift: pip-audit, pnpm audit, lockfile hygiene."
  - name: version-check
    category: quality
    blurb: "Deep-research the current stable/LTS version and support window before installing or pinning."
  - name: incident-response
    category: quality
    blurb: "Once it is live-broken or a secret leaked: report, contain, fix, blameless post-mortem, rotate."

  # --- Workflow & Meta ---
  - name: commit-message
    category: workflow
    blurb: "Write Conventional Commits from the staged diff; correct type/scope/subject."
  - name: git-workflow
    category: workflow
    blurb: "The branch to PR to merge loop: branch discipline, rebase before review, and safe recovery."
  - name: changelog
    category: workflow
    blurb: "Maintain a Keep a Changelog CHANGELOG.md; roll Unreleased into a release."
  - name: skill-authoring
    category: workflow
    blurb: "Author or fix a nanolama skill: the SKILL.md contract, description formula, cross-refs."
