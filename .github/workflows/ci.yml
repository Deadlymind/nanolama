name: validate

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this workflow only reads the tree.
permissions:
  contents: read

# One run per ref; a new push cancels the in-flight run.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions are pinned to a commit SHA, not a moving tag:
      # a tag like @v7 can be re-pointed at malicious code, a SHA cannot.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Validate skills (frontmatter, naming, cross-refs, catalog sync)
        run: python scripts/validate_skills.py

      # Pinned, not @latest — same reason the actions above are pinned to a SHA.
      # This package publishes very frequently, so a floating tag lets an upstream
      # release break validation on an unrelated PR. Bump deliberately after testing:
      #   npm view @anthropic-ai/claude-code version
      - name: Validate the plugin manifest (official Claude Code validator)
        run: npx --yes @anthropic-ai/claude-code@2.1.211 plugin validate . --strict

      - name: Check README is generated from the catalog
        run: python scripts/generate_readme.py --check

      - name: Run tests
        run: python -m pytest -q
