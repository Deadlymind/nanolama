name: validate

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: this workflow only reads the tree.
permissions:
  contents: read

# One run per ref; a new push cancels the in-flight run.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions are pinned to a commit SHA, not a moving tag:
      # a tag like @v4 can be re-pointed at malicious code, a SHA cannot.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Validate skills (frontmatter, naming, cross-refs, catalog sync)
        run: python scripts/validate_skills.py

      - name: Validate the plugin manifest (official Claude Code validator)
        run: npx --yes @anthropic-ai/claude-code@latest plugin validate . --strict

      - name: Check README is generated from the catalog
        run: python scripts/generate_readme.py --check

      - name: Run tests
        run: python -m pytest -q
