name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Validate skills (frontmatter, naming, cross-refs, catalog sync)
        run: python scripts/validate_skills.py

      - name: Check README is generated from the catalog
        run: python scripts/generate_readme.py --check

      - name: Run tests
        run: python -m pytest -q
